name: XMLTV Generator

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main 
    paths:
      - '.github/workflows/generate.yml'
      
  
jobs:
  load:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo content
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: execute py script
        run: |
          python ./service/gracenote/gracenote.py
          python ./service/gracenote/gracenote.py ./service/gracenote/USA-GNSTR-DEFAULT.json ./guide/USA-GNSTR-DEFAULT.xml
          python ./service/gracenote/gracenote.py ./service/gracenote/USA-C-BAND-DEFAULT.json ./guide/USA-C-BAND-DEFAULT.xml
          python ./service/fuel/main.py
          gzip -c ./guide/gracenote.xml > ./guide/gracenote.xml.gz
                
      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add --force ./guide
          git commit -m "Update Gracenote XMLTV"
          git push && break
