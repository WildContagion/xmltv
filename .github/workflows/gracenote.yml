name: Gracenote XMLTV Generator

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  
jobs:
  load:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo content
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install requests --upgrade pip
          
      - name: execute py script
        run: |
          mkdir guide
          python ./gracenote/gracenote.py -i ./gracenote/channels.json -o ./guide/gracenote.xml
          gzip -c ./guide/gracenote.xml > ./guide/gracenote.xml.gz
        
      - uses: JamesIves/github-pages-deploy-action@v4
        if: ${{ !env.ACT && github.ref == 'refs/heads/master' }}
        with:
          folder: .
          git-config-name: github-actions[bot]
          git-config-email: github-actions[bot]@users.noreply.github.com
          commit-message: 'Update EPG'
          clean: false
          force: false
